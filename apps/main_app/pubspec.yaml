name: main_app
description: "Polban Lost and Found — aplikasi utama."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Feature packages
  home:
    path: ../../features/home
  post:
    path: ../../features/post
  sync_manager:
    path: ../../features/sync_manager
  report:
    path: ../../features/report
  login:
    path: ../../features/login
  history:
    path: ../../features/history
  claim:
    path: ../../features/claim
  teknisi_dashboard:
    path: ../../features/teknisi_dashboard
  moderation:
    path: ../../features/moderation

  # Core
  core_module:
    path: ../../core/core_module

  # Plugins
  cupertino_icons: ^1.0.8
  go_router: ^14.1.1
  provider: ^6.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true